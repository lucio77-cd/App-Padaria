<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Sistema Cris</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f4f7f6; }
        .card-add { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-add { background: #3498db; color: white; border: none; width: 100%; padding: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #eee; }
        .btn-del { background: #ff4757; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .voltar { margin-bottom: 15px; cursor: pointer; border: none; background: #95a5a6; color: white; padding: 8px 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <button class="voltar" onclick="location.href='salao.html'">⬅ VOLTAR</button>
    <h2>Gerenciar Cardápio</h2>

    <div class="card-add">
        <input type="text" id="nome" placeholder="Nome (Ex: Pão de Queijo)">
        <input type="number" id="preco" step="0.01" placeholder="Preço (Ex: 5.50)">
        <button class="btn-add" id="salvar">CADASTRAR PRODUTO</button>
    </div>

    <h3>Lista de Produtos</h3>
    <div id="lista">Carregando...</div>

<script type="module">
    import { db, auth } from './firebase.js';
    import { collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    auth.onAuthStateChanged(user => {
        if (!user) return;
        const colRef = collection(db, `produtos_${user.uid}`);

        // Salvar com validação para evitar NaN
        document.getElementById('salvar').onclick = async () => {
            const n = document.getElementById('nome').value;
            const p = parseFloat(document.getElementById('preco').value);
            if (n && !isNaN(p)) {
                await addDoc(colRef, { nome: n, preco: p });
                document.getElementById('nome').value = '';
                document.getElementById('preco').value = '';
            } else { alert("Preencha nome e preço (use ponto para centavos)!"); }
        };

        // Listar com opção de excluir
        onSnapshot(colRef, snap => {
            const lista = document.getElementById('lista');
            lista.innerHTML = snap.empty ? 'Nenhum produto cadastrado.' : '';
            snap.forEach(pDoc => {
                const p = pDoc.data();
                const precoVal = parseFloat(p.preco || 0).toFixed(2);
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div><strong>${p.nome}</strong><br><small>R$ ${precoVal}</small></div>
                    <button class="btn-del" onclick="apagar('${pDoc.id}')">Excluir</button>
                `;
                lista.appendChild(div);
            });
        });

        window.apagar = async (id) => {
            if (confirm("Deseja excluir este produto do cardápio?")) {
                await deleteDoc(doc(db, `produtos_${user.uid}`, id));
            }
        };
    });
</script>
</body>
</html>
