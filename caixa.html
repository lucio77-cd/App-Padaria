<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caixa — Sistema Cris</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="style.css">
  <style>
    .page-intro { margin-bottom: 20px; }
    .page-intro h1 { font-size: 1.35rem; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
    .page-intro p  { font-size: 0.85rem; color: var(--text-muted); }

    /* RESUMO */
    .resumo-topo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 24px;
    }

    /* GRID MESAS */
    .caixa-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
    }

    .caixa-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: var(--shadow-sm);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .caixa-card.ocupada {
      border-color: #FCA5A5;
      background: #FFFBFB;
      cursor: pointer;
    }

    .caixa-card.ocupada:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }

    .caixa-card.livre { opacity: 0.5; cursor: default; }

    .caixa-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .caixa-mesa-num {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .caixa-total {
      font-size: 1.45rem;
      font-weight: 800;
    }

    .caixa-card.livre   .caixa-total { font-size: 0.95rem; color: var(--text-muted); font-weight: 400; }
    .caixa-card.ocupada .caixa-total { color: var(--ocupada); }

    .caixa-action {
      font-size: 0.77rem;
      font-weight: 600;
      color: var(--ocupada);
    }

    @media (max-width: 768px) {
      .caixa-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .caixa-total { font-size: 1.15rem; }
    }
  </style>
</head>
<body>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">🍞</span>
      <div>
        <div class="logo-text">Sistema Cris</div>
        <span class="logo-sub">Padaria</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="salao.html"     class="nav-item"><span class="nav-icon">🪑</span> Salão</a>
      <a href="caixa.html"     class="nav-item active"><span class="nav-icon">💰</span> Caixa</a>
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="produtos.html"  class="nav-item"><span class="nav-icon">🛍️</span> Cardápio</a>
    </nav>
  </aside>

  <!-- CONTEÚDO -->
  <div class="main-content">
    <div class="topbar">
      <span class="topbar-title">💰 Caixa</span>
    </div>

    <div class="page-body">
      <div class="page-intro">
        <h1>Caixa Central</h1>
        <p>Toque em uma mesa <span style="color:var(--ocupada);font-weight:700;">vermelha</span> para finalizar o pagamento.</p>
      </div>

      <div class="resumo-topo">
        <div class="stat-card">
          <div class="stat-label">Mesas abertas</div>
          <div class="stat-value" id="cnt-abertas" style="color:var(--ocupada);">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total em aberto</div>
          <div class="stat-value green" id="total-aberto">R$ 0,00</div>
        </div>
      </div>

      <div id="grid-caixa" class="caixa-grid">
        <div style="color:var(--text-muted); font-size:0.85rem; grid-column:1/-1; text-align:center; padding:32px;">
          Carregando mesas...
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV MOBILE -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="salao.html"     class="bnav-item"><span class="bnav-icon">🪑</span>Salão</a>
      <a href="caixa.html"     class="bnav-item active"><span class="bnav-icon">💰</span>Caixa</a>
      <a href="dashboard.html" class="bnav-item"><span class="bnav-icon">📊</span>Dados</a>
      <a href="produtos.html"  class="bnav-item"><span class="bnav-icon">🛍️</span>Cardápio</a>
    </div>
  </nav>
</div>

<div class="toast-container" id="toast-container"></div>

<script type="module">
  import { db, auth } from './firebase.js';
  import { collection, onSnapshot, doc, getDoc } from
    "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  function showToast(msg, type = '') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  auth.onAuthStateChanged(async user => {
    if (!user) { location.href = 'index.html'; return; }

    // Lê número de mesas da config (mesmo que salao.html)
    let qtdMesas = 11;
    try {
      const configSnap = await getDoc(doc(db, `config_${user.uid}`, 'salao'));
      if (configSnap.exists()) qtdMesas = configSnap.data().totalMesas || 11;
    } catch (e) { /* usa 11 como padrão */ }

    const mesasRef = collection(db, `mesas_${user.uid}`);

    onSnapshot(mesasRef, snap => {
      const grid = document.getElementById('grid-caixa');
      grid.innerHTML = '';

      // Monta mapa de dados
      const dados = {};
      snap.forEach(d => { dados[d.id] = d.data(); });

      let cntAbertas = 0;
      let totalAberto = 0;

      for (let i = 1; i <= qtdMesas; i++) {
        // FIX: fallback para mesa sem doc no Firestore
        const mesa  = dados[`mesa_${i}`] || { ocupada: false, total: 0 };
        const total = mesa.total || 0;

        if (mesa.ocupada) {
          cntAbertas++;
          totalAberto = Math.round((totalAberto + total) * 100) / 100;
        }

        const card = document.createElement('div');
        card.className = `caixa-card ${mesa.ocupada ? 'ocupada' : 'livre'}`;

        card.innerHTML = `
          <div class="caixa-card-header">
            <span class="caixa-mesa-num">Mesa ${i}</span>
            ${mesa.ocupada
              ? '<span class="badge badge-ocupada">🔴 Ocupada</span>'
              : '<span class="badge badge-livre">🟢 Livre</span>'}
          </div>
          <div class="caixa-total">
            ${mesa.ocupada ? 'R$ ' + total.toFixed(2) : '—'}
          </div>
          ${mesa.ocupada
            ? '<div class="caixa-action">Toque para finalizar →</div>'
            : '<div style="font-size:0.75rem;color:var(--text-muted);">Disponível</div>'}
        `;

        if (mesa.ocupada) {
          card.onclick = () => location.href = `detalhe-caixa.html?mesa=${i}`;
        }

        grid.appendChild(card);
      }

      document.getElementById('cnt-abertas').textContent = cntAbertas;
      document.getElementById('total-aberto').textContent = `R$ ${totalAberto.toFixed(2)}`;
    });
  });
</script>
</body>
</html>
