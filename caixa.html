<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa - Sistema Cris</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 15px; }
        .card-caixa { background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .total-valor { font-size: 3rem; font-weight: bold; color: #2ecc71; margin: 20px 0; }
        .item-linha { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dotted #ccc; font-size: 0.9rem; }
        .btn-pago { background: #27ae60; color: white; border: none; padding: 20px; border-radius: 12px; width: 100%; font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>
    <button onclick="location.href='salao.html'">⬅ Cancelar</button>
    <div id="caixa-container" class="card-caixa" style="margin-top:20px;">
        <p>Carregando...</p>
    </div>

    <script type="module">
        import { db, auth } from './firebase.js';
        import { doc, onSnapshot, updateDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const mesaId = new URLSearchParams(window.location.search).get('mesa');

        auth.onAuthStateChanged(user => {
            if (user && mesaId) {
                const mesaRef = doc(db, `mesas_${user.uid}`, `mesa_${mesaId}`);
                onSnapshot(mesaRef, (snap) => {
                    if (snap.exists() && snap.data().ocupada) {
                        const dados = snap.data();
                        const itensHtml = dados.itens.map(i => `<div class="item-linha"><span>${i.nome}</span><span>R$ ${i.preco.toFixed(2)}</span></div>`).join('');
                        
                        document.getElementById('caixa-container').innerHTML = `
                            <h2 style="color:#7f8c8d;">MESA ${mesaId}</h2>
                            <div style="margin: 20px 0; text-align:left;">${itensHtml}</div>
                            <div class="total-valor">R$ ${dados.total.toFixed(2)}</div>
                            <button class="btn-pago" id="finalizar">FINALIZAR PAGAMENTO</button>
                        `;

                        document.getElementById('finalizar').onclick = async () => {
                            if(!confirm("Confirmar pagamento?")) return;
                            await addDoc(collection(db, "vendas"), { total: dados.total, mesa: mesaId, data: serverTimestamp(), userId: user.uid });
                            await updateDoc(mesaRef, { ocupada: false, itens: [], total: 0 });
                            alert("Mesa liberada!");
                            location.href = 'salao.html';
                        };
                    }
                });
            }
        });
    </script>
</body>
</html>
