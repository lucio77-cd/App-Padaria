<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa - Sistema Cris</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; text-align: center; padding: 20px; }
        .display-caixa { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-top: 30px; }
        .valor { font-size: 4rem; color: #27ae60; font-weight: bold; margin: 20px 0; }
        .btn-pagar { background: #27ae60; color: white; border: none; padding: 20px; width: 100%; border-radius: 12px; font-size: 1.3rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <button onclick="location.href='salao.html'">⬅ VOLTAR SALÃO</button>

    <div id="conteudo-caixa">
        <div class="display-caixa">
            <p>Selecione uma mesa no salão.</p>
        </div>
    </div>

<script type="module">
    import { db, auth } from './firebase.js';
    import { doc, onSnapshot, updateDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const mesaId = new URLSearchParams(window.location.search).get('mesa');

    auth.onAuthStateChanged(user => {
        if (user && mesaId) {
            const mesaRef = doc(db, `mesas_${user.uid}`, `mesa_${mesaId}`);
            onSnapshot(mesaRef, s => {
                if (s.exists() && s.data().ocupada) {
                    const total = s.data().total || 0;
                    document.getElementById('conteudo-caixa').innerHTML = `
                        <div class="display-caixa">
                            <h3>MESA ${mesaId}</h3>
                            <div class="valor">R$ ${total.toFixed(2)}</div>
                            <button class="btn-pagar" id="btn-finalizar">FINALIZAR PAGAMENTO</button>
                        </div>`;
                    
                    document.getElementById('btn-finalizar').onclick = async () => {
                        if (confirm("Confirmar recebimento?")) {
                            await addDoc(collection(db, `vendas_${user.uid}`), {
                                valor: total,
                                mesa: mesaId,
                                data: serverTimestamp()
                            });
                            await updateDoc(mesaRef, { ocupada: false, total: 0, itens: [] });
                            alert("Venda registrada!");
                            location.href = 'salao.html';
                        }
                    };
                } else {
                    document.getElementById('conteudo-caixa').innerHTML = "Mesa já está livre.";
                }
            });
        }
    });
</script>
</body>
</html>
