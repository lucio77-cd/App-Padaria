<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa Central - Sistema Cris</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 15px; text-align: center; }
        .grid-mesas { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .mesa-card { padding: 20px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s; }
        .livre { background-color: #a2e4c1; color: #1e4d35; cursor: default; opacity: 0.6; }
        .ocupada { background-color: #f1948a; color: #78281f; border: 2px solid #c0392b; }
        .header { background: #2c3e50; color: white; padding: 15px; margin: -15px -15px 15px -15px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>CAIXA</h1>
        <button onclick="location.href='salao.html'">VOLTAR AO SALÃO</button>
    </div>

    <h3>Selecione uma mesa ocupada para finalizar:</h3>
    <div id="grid-caixa" class="grid-mesas">Carregando mesas...</div>

<script type="module">
    import { db, auth } from './firebase.js';
    import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    auth.onAuthStateChanged(user => {
        if (!user) return;
        const mesasRef = collection(db, `mesas_${user.uid}`);

        onSnapshot(mesasRef, snap => {
            const grid = document.getElementById('grid-caixa');
            grid.innerHTML = "";
            
            // Cria os cards das mesas (1 a 6)
            snap.forEach(doc => {
                const mesa = doc.data();
                const idNum = doc.id.replace('mesa_', '');
                const card = document.createElement('div');
                
                card.className = `mesa-card ${mesa.ocupada ? 'ocupada' : 'livre'}`;
                card.innerHTML = `MESA ${idNum}<br>${mesa.ocupada ? 'R$ ' + mesa.total.toFixed(2) : 'LIVRE'}`;
                
                // Só permite clicar se estiver ocupada
                if (mesa.ocupada) {
                    card.onclick = () => location.href = `detalhe-caixa.html?mesa=${idNum}`;
                }
                
                grid.appendChild(card);
            });
        });
    });
</script>
</body>
</html>
