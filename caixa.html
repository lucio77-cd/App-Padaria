<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa - Sistema Cris</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
        .card { background: white; margin: 15px; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .total { font-size: 3rem; font-weight: bold; color: #2ecc71; margin: 20px 0; }
        .btn-pago { background: #27ae60; color: white; border: none; padding: 20px; border-radius: 12px; width: 100%; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<header><h1>CAIXA</h1></header>
<button style="margin: 10px" onclick="location.href='salao.html'">⬅ VOLTAR</button>
<div id="caixa-area">
    <div class="card"><p>Selecione uma mesa ocupada no salão.</p></div>
</div>
<script type="module">
    import { db, auth } from './firebase.js';
    import { doc, onSnapshot, updateDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const id = new URLSearchParams(window.location.search).get('mesa');
    auth.onAuthStateChanged(user => {
        if (user && id) {
            const ref = doc(db, `mesas_${user.uid}`, `mesa_${id}`);
            onSnapshot(ref, s => {
                if(s.exists() && s.data().ocupada) {
                    const d = s.data();
                    document.getElementById('caixa-area').innerHTML = `<div class="card"><h2>MESA ${id}</h2><div class="total">R$ ${d.total.toFixed(2)}</div><button class="btn-pago" id="final">FINALIZAR PAGAMENTO</button></div>`;
                    document.getElementById('final').onclick = async () => {
                        if(!confirm("Confirmar recebimento?")) return;
                        await addDoc(collection(db, `vendas_${user.uid}`), { valor: d.total, data: serverTimestamp() });
                        await updateDoc(ref, { ocupada: false, itens: [], total: 0 });
                        alert("Pago!"); location.href='salao.html';
                    };
                }
            });
        }
    });
</script>
</body>
</html>
