<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa - Sistema Cris</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; text-align: center; padding: 20px; }
        .caixa-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-top: 20px; }
        .valor-final { font-size: 3.5rem; color: #27ae60; font-weight: bold; margin: 20px 0; }
        .btn-ok { background: #27ae60; color: white; border: none; padding: 20px; width: 100%; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <button onclick="location.href='salao.html'">⬅ VOLTAR AO SALÃO</button>

    <div id="caixa-container">
        <p>Aguardando seleção de mesa...</p>
    </div>

<script type="module">
    import { db, auth } from './firebase.js';
    import { doc, onSnapshot, updateDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const mesaId = new URLSearchParams(window.location.search).get('mesa');

    auth.onAuthStateChanged(user => {
        if (user && mesaId) {
            const mesaRef = doc(db, `mesas_${user.uid}`, `mesa_${mesaId}`);
            onSnapshot(mesaRef, s => {
                if (s.exists() && s.data().ocupada) {
                    const total = s.data().total || 0;
                    document.getElementById('caixa-container').innerHTML = `
                        <div class="caixa-card">
                            <h3>PAGAMENTO MESA ${mesaId}</h3>
                            <div class="valor-final">R$ ${total.toFixed(2)}</div>
                            <button class="btn-ok" id="btn-fim">FINALIZAR E LIBERAR MESA</button>
                        </div>`;
                    
                    document.getElementById('btn-fim').onclick = async () => {
                        if (confirm("Confirmar pagamento recebido?")) {
                            // Salva a venda no histórico
                            await addDoc(collection(db, `vendas_${user.uid}`), {
                                valor: total,
                                mesa: mesaId,
                                data: serverTimestamp()
                            });
                            // Limpa a mesa
                            await updateDoc(mesaRef, { ocupada: false, total: 0, itens: [] });
                            alert("Venda finalizada!");
                            location.href = 'salao.html';
                        }
                    };
                } else {
                    document.getElementById('caixa-container').innerHTML = "<h3>Esta mesa já está livre.</h3>";
                }
            });
        }
    });
</script>
</body>
</html>
