<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa - Sistema Cris</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
        .nav-bar { padding: 10px; background: #ecf0f1; display: flex; gap: 10px; }
        .btn-nav { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; }
        .btn-voltar { background: #95a5a6; }
        .btn-dash { background: #9b59b6; }
        .container { padding: 15px; }
        .card-caixa { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .total-valor { font-size: 3rem; font-weight: bold; color: #2c3e50; margin: 20px 0; }
        .btn-finalizar { background: #27ae60; color: white; border: none; padding: 20px; border-radius: 12px; width: 100%; font-size: 1.3rem; font-weight: bold; }
    </style>
</head>
<body>

<header><h1>CAIXA</h1></header>

<div class="nav-bar">
    <button class="btn-nav btn-voltar" onclick="location.href='salao.html'">⬅ VOLTAR SALÃO</button>
    <button class="btn-nav btn-dash" onclick="location.href='dashboard.html'">📊 DASHBOARD</button>
</div>

<div class="container" id="conteudo-caixa">
    <div class="card-caixa">
        <p>Selecione uma mesa ocupada no salão para fechar.</p>
    </div>
</div>

<script type="module">
    import { db, auth } from './firebase.js';
    import { doc, getDoc, updateDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const mesaId = params.get('mesa');

    if (mesaId) {
        const user = auth.onAuthStateChanged(async user => {
            if (user) {
                const mesaRef = doc(db, `mesas_${user.uid}`, `mesa_${mesaId}`);
                const snap = await getDoc(mesaRef);
                if (snap.exists() && snap.data().ocupada) {
                    const dados = snap.data();
                    document.getElementById('conteudo-caixa').innerHTML = `
                        <div class="card-caixa">
                            <h2>FECHAR MESA ${mesaId}</h2>
                            <div class="total-valor">R$ ${dados.total.toFixed(2)}</div>
                            <button class="btn-finalizar" id="btnConfirmar">RECEBER E LIBERAR</button>
                        </div>`;
                    document.getElementById('btnConfirmar').onclick = () => finalizar(mesaId, dados.total, dados.itens);
                }
            }
        });
    }

    async function finalizar(id, total, itens) {
        const user = auth.currentUser;
        await addDoc(collection(db, "vendas"), { userId: user.uid, mesa: id, total: total, data: serverTimestamp() });
        await updateDoc(doc(db, `mesas_${user.uid}`, `mesa_${id}`), { ocupada: false, itens: [] });
        alert("Mesa liberada!");
        location.href = 'salao.html';
    }
</script>
</body>
</html>
