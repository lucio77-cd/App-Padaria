<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa - Sistema Cris</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
        .nav-bar { padding: 10px; background: #ecf0f1; display: flex; gap: 10px; }
        .btn-nav { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; }
        .btn-voltar { background: #95a5a6; }
        .btn-dash { background: #9b59b6; }
        .container { padding: 15px; }
        .card-caixa { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .total-valor { font-size: 3.5rem; font-weight: bold; color: #2c3e50; margin: 15px 0; }
        .lista-detalhes { text-align: left; border-top: 1px solid #eee; padding-top: 15px; margin-bottom: 20px; }
        .btn-finalizar { background: #27ae60; color: white; border: none; padding: 20px; border-radius: 12px; width: 100%; font-size: 1.3rem; font-weight: bold; box-shadow: 0 4px 0 #1e8449; }
        .btn-finalizar:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

<header><h1>CAIXA</h1></header>

<div class="nav-bar">
    <button class="btn-nav btn-voltar" onclick="location.href='salao.html'">⬅ VOLTAR SALÃO</button>
    <button class="btn-nav btn-dash" onclick="location.href='dashboard.html'">📊 DASHBOARD</button>
</div>

<div class="container" id="conteudo-caixa">
    <div class="card-caixa">
        <p style="color: #7f8c8d;">Aguardando seleção de mesa ocupada...</p>
    </div>
</div>

<script type="module">
    import { db, auth } from './firebase.js';
    import { doc, onSnapshot, updateDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Pega o ID da mesa pela URL (ex: caixa.html?mesa=1)
    const params = new URLSearchParams(window.location.search);
    const mesaId = params.get('mesa');

    auth.onAuthStateChanged(user => {
        if (user && mesaId) {
            const mesaRef = doc(db, `mesas_${user.uid}`, `mesa_${mesaId}`);
            
            // "Escuta" a mesa em tempo real
            onSnapshot(mesaRef, (docSnap) => {
                if (docSnap.exists() && docSnap.data().ocupada) {
                    const dados = docSnap.data();
                    let itensHtml = dados.itens.map(i => `<div>${i.nome} - R$ ${i.preco.toFixed(2)}</div>`).join('');
                    
                    document.getElementById('conteudo-caixa').innerHTML = `
                        <div class="card-caixa">
                            <h2 style="margin:0; color:#7f8c8d;">MESA ${mesaId}</h2>
                            <div class="total-valor">R$ ${dados.total.toFixed(2)}</div>
                            <div class="lista-detalhes">
                                <b>Itens do Pedido:</b>
                                ${itensHtml}
                            </div>
                            <button class="btn-finalizar" id="btnFinalizar">FINALIZAR E LIBERAR</button>
                        </div>
                    `;

                    document.getElementById('btnFinalizar').onclick = () => finalizarVenda(user.uid, mesaId, dados.total, dados.itens);
                } else {
                    document.getElementById('conteudo-caixa').innerHTML = `
                        <div class="card-caixa">
                            <p>Esta mesa já está livre ou não foi selecionada corretamente.</p>
                            <button class="btn-nav btn-voltar" style="width:100%" onclick="location.href='salao.html'">VOLTAR AO SALÃO</button>
                        </div>`;
                }
            });
        }
    });

    async function finalizarVenda(uid, id, total, itens) {
        if(!confirm("Confirmar recebimento?")) return;
        
        try {
            // 1. Salva no histórico de vendas
            await addDoc(collection(db, "vendas"), {
                userId: uid,
                mesa: id,
                total: total,
                itens: itens,
                data: serverTimestamp()
            });

            // 2. Limpa a mesa no banco de dados
            const mesaRef = doc(db, `mesas_${uid}`, `mesa_${id}`);
            await updateDoc(mesaRef, { ocupada: false, itens: [], total: 0 });

            alert("Venda concluída! Mesa liberada.");
            location.href = 'salao.html';
        } catch (e) {
            alert("Erro ao fechar caixa: " + e.message);
        }
    }
</script>
</body>
</html>
