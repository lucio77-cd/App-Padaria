<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa - Sistema Cris</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .venda-card { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 5px solid #2ecc71; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-fechar { background: #e67e22; color: white; border: none; padding: 10px; border-radius: 5px; width: 100%; font-weight: bold; margin-top: 10px; }
        .total-destaque { font-size: 1.4rem; color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #2c3e50; color: white;">
        <button onclick="location.href='salao.html'" style="background: #95a5a6; color: white; border: none; padding: 8px 15px; border-radius: 5px;">Voltar</button>
        <h2 style="margin: 0;">Caixa</h2>
        <div style="width: 70px;"></div>
    </header>

    <main style="padding: 15px;">
        <div id="area-fechamento">
            <p style="text-align: center; color: #7f8c8d;">Selecione uma mesa ocupada no Salão para fechar a conta.</p>
        </div>

        <hr>
        <h3>Histórico de Hoje</h3>
        <div id="lista-vendas"></div>
    </main>

    <script type="module">
        import { db, auth } from './firebase.js';
        import { collection, addDoc, doc, updateDoc, deleteDoc, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Função para Fechar a Mesa e Liberar
        window.fecharMesa = async (mesaId, total, itens) => {
            if (!confirm(`Confirmar fechamento de R$ ${total.toFixed(2)}?`)) return;

            try {
                // 1. Salva a venda no histórico
                await addDoc(collection(db, "vendas"), {
                    userId: auth.currentUser.uid,
                    mesa: mesaId,
                    total: total,
                    itens: itens,
                    data: serverTimestamp()
                });

                // 2. Limpa a mesa (Deleta os itens dela para ela ficar "LIVRE")
                const mesaRef = doc(db, `mesas_${auth.currentUser.uid}`, `mesa_${mesaId}`);
                await updateDoc(mesaRef, { ocupada: false, itens: [] });

                alert("Mesa liberada!");
                location.href = 'salao.html';
            } catch (e) {
                console.error("Erro ao fechar:", e);
            }
        };

        // Lógica para listar vendas (Dashboard simples abaixo)
        auth.onAuthStateChanged(user => {
            if (user) {
                const q = query(collection(db, "vendas"), where("userId", "==", user.uid));
                onSnapshot(q, (snapshot) => {
                    let html = '';
                    snapshot.forEach(doc => {
                        const v = doc.data();
                        html += `<div class="venda-card">Mesa ${v.mesa}: <b>R$ ${v.total.toFixed(2)}</b></div>`;
                    });
                    document.getElementById('lista-vendas').innerHTML = html;
                });
            }
        });
    </script>
</body>
</html>
