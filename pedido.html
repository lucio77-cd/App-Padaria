<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido - Sistema Cris</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        .nav-back { background: #2c3e50; padding: 15px; color: white; display: flex; align-items: center; gap: 10px; }
        .btn-voltar { background: #7f8c8d; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .container { padding: 15px; }
        .resumo { background: #34495e; color: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .lista-consumo { background: white; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; }
        .item-linha { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; }
        
        /* Estilo dos botões de produto */
        .grid-produtos { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .btn-produto { 
            background: white; border: 1px solid #dcdde1; padding: 20px; border-radius: 12px; 
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; font-size: 1.1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            cursor: pointer; active: transform: scale(0.98);
        }
        .btn-produto span { color: #2c3e50; }
        .btn-produto b { color: #27ae60; }
    </style>
</head>
<body>

<div class="nav-back">
    <button class="btn-voltar" onclick="location.href='salao.html'">⬅ VOLTAR</button>
    <h3 style="margin:0">Mesa <span id="mesa-num">?</span></h3>
</div>

<div class="container">
    <div class="resumo">
        <span>TOTAL ACUMULADO:</span>
        <h2 id="total-val" style="margin:0">R$ 0,00</h2>
    </div>

    <h4>Itens na Mesa:</h4>
    <div class="lista-consumo" id="lista-itens">Nenhum item lançado.</div>

    <hr>
    <h4>Toque para Adicionar:</h4>
    <div class="grid-produtos" id="cardapio-render">Carregando produtos...</div>
</div>

<script type="module">
    import { db, auth } from './firebase.js';
    import { doc, onSnapshot, updateDoc, arrayUnion, collection, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const mesaId = params.get('mesa');
    document.getElementById('mesa-num').innerText = mesaId;

    auth.onAuthStateChanged(async user => {
        if (!user) return;
        const mesaRef = doc(db, `mesas_${user.uid}`, `mesa_${mesaId}`);

        // 1. Monitora a mesa em tempo real (Total e Itens já pedidos)
        onSnapshot(mesaRef, (snap) => {
            if (snap.exists()) {
                const dados = snap.data();
                document.getElementById('total-val').innerText = `R$ ${dados.total.toFixed(2)}`;
                document.getElementById('lista-itens').innerHTML = (dados.itens && dados.itens.length) ? 
                    dados.itens.map(i => `<div class="item-linha"><span>${i.nome}</span> <b>R$ ${i.preco.toFixed(2)}</b></div>`).join('') : "Mesa vazia";
            }
        });

        // 2. Busca todos os produtos cadastrados na sua coleção 'produtos'
        try {
            const prodSnap = await getDocs(collection(db, `produtos_${user.uid}`));
            const container = document.getElementById('cardapio-render');
            container.innerHTML = '';

            if (prodSnap.empty) {
                container.innerHTML = "<p>Nenhum produto cadastrado. Vá em 'Produtos' e adicione itens.</p>";
            }

            prodSnap.forEach(docProd => {
                const item = docProd.data();
                const botao = document.createElement('div');
                botao.className = 'btn-produto';
                botao.innerHTML = `<span>${item.nome}</span> <b>R$ ${item.preco.toFixed(2)}</b>`;
                
                // Ação de adicionar ao clicar
                botao.onclick = async () => {
                    const mesaAtual = await getDoc(mesaRef);
                    const totalVelho = mesaAtual.exists() ? (mesaAtual.data().total || 0) : 0;
                    
                    await updateDoc(mesaRef, {
                        ocupada: true,
                        itens: arrayUnion({ nome: item.nome, preco: item.preco }),
                        total: totalVelho + item.preco
                    });
                };
                container.appendChild(botao);
            });
        } catch (e) {
            console.error("Erro ao carregar cardápio:", e);
        }
    });
</script>
</body>
</html>
