<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa - Sistema Cris</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; }
        .header { background: #2c3e50; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 15px; }
        .total-box { background: #34495e; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .cardapio-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .btn-p { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; cursor: pointer; font-weight: bold; }
        .btn-caixa { background: #27ae60; color: white; border: none; width: 100%; padding: 18px; border-radius: 10px; font-weight: bold; margin-top: 25px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="location.href='salao.html'">⬅ Voltar</button>
        <h2 id="mesa-titulo">Mesa</h2>
    </div>

    <div class="container">
        <div class="total-box">
            <span>TOTAL ACUMULADO:</span>
            <h2 id="total-txt" style="margin:0">R$ 0,00</h2>
        </div>

        <h4>Consumo Atual:</h4>
        <div id="itens-mesa" style="background:#eee; padding:10px; border-radius:5px; margin-bottom:20px;">Nenhum item...</div>

        <h4>Toque para Adicionar:</h4>
        <div id="cardapio-lista" class="cardapio-grid">Carregando cardápio...</div>

        <button class="btn-caixa" id="ir-caixa">💰 IR PARA O CAIXA (FECHAR)</button>
    </div>

<script type="module">
    import { db, auth } from './firebase.js';
    import { doc, onSnapshot, updateDoc, arrayUnion, collection, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const mesaId = params.get('mesa') || "1";
    document.getElementById('mesa-titulo').innerText = `Mesa ${mesaId}`;
    document.getElementById('ir-caixa').onclick = () => location.href = `caixa.html?mesa=${mesaId}`;

    auth.onAuthStateChanged(async user => {
        if (!user) return;
        const mesaRef = doc(db, `mesas_${user.uid}`, `mesa_${mesaId}`);

        // Observa mudanças na mesa (Total e Itens)
        onSnapshot(mesaRef, s => {
            const data = s.exists() ? s.data() : { total: 0, itens: [] };
            document.getElementById('total-txt').innerText = `R$ ${(data.total || 0).toFixed(2)}`;
            
            const divItens = document.getElementById('itens-mesa');
            divItens.innerHTML = (data.itens && data.itens.length > 0) 
                ? data.itens.map(i => `<div>${i.nome} - R$ ${i.preco.toFixed(2)}</div>`).join('')
                : "Nenhum item na mesa.";
        });

        // Carrega o Cardápio
        const pSnap = await getDocs(collection(db, `produtos_${user.uid}`));
        const listaUI = document.getElementById('cardapio-lista');
        listaUI.innerHTML = pSnap.empty ? "Cadastre produtos primeiro!" : "";

        pSnap.forEach(pDoc => {
            const p = pDoc.data();
            const btn = document.createElement('div');
            btn.className = 'btn-p';
            btn.innerHTML = `<span>${p.nome}</span> <span>R$ ${parseFloat(p.preco).toFixed(2)}</span>`;
            btn.onclick = async () => {
                const mesaSnap = await getDoc(mesaRef);
                const totalAtual = mesaSnap.exists() ? (mesaSnap.data().total || 0) : 0;
                await updateDoc(mesaRef, {
                    ocupada: true,
                    total: totalAtual + parseFloat(p.preco),
                    itens: arrayUnion({ nome: p.nome, preco: parseFloat(p.preco) })
                });
            };
            listaUI.appendChild(btn);
        });
    });
</script>
</body>
</html>
