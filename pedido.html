<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido - Sistema Cris</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; }
        .nav { background: #2c3e50; color: white; padding: 15px; display: flex; align-items: center; gap: 10px; }
        .container { padding: 15px; }
        .total-card { background: #34495e; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .grid-produtos { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .item-btn { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; font-weight: bold; cursor: pointer; }
        .btn-voltar { background: #7f8c8d; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav">
    <button class="btn-voltar" onclick="location.href='salao.html'">⬅ VOLTAR</button>
    <h2 style="margin:0">Mesa <span id="num-mesa">?</span></h2>
</div>

<div class="container">
    <div class="total-card">
        <small>VALOR DA CONTA</small>
        <h1 id="total-val" style="margin:0">R$ 0,00</h1>
    </div>

    <h4>Adicionar Produtos:</h4>
    <div id="lista-cardapio" class="grid-produtos">Carregando cardápio...</div>
</div>

<script type="module">
    import { db, auth } from './firebase.js';
    import { doc, onSnapshot, updateDoc, arrayUnion, collection, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 1. PEGA O ID DA MESA DA URL
    const params = new URLSearchParams(window.location.search);
    const mesaId = params.get('mesa') || "1"; 
    document.getElementById('num-mesa').innerText = mesaId;

    auth.onAuthStateChanged(async user => {
        if (!user) return;

        // Referência correta da mesa baseada no clique
        const mesaRef = doc(db, `mesas_${user.uid}`, `mesa_${mesaId}`);

        // 2. MOSTRA O TOTAL DA MESA EM TEMPO REAL
        onSnapshot(mesaRef, (snap) => {
            if (snap.exists()) {
                const total = snap.data().total || 0;
                document.getElementById('total-val').innerText = `R$ ${total.toFixed(2)}`;
            }
        });

        // 3. CARREGA O CARDÁPIO E ADICIONA NA MESA CORRETA
        const pSnap = await getDocs(collection(db, `produtos_${user.uid}`));
        const cardapioDiv = document.getElementById('lista-cardapio');
        cardapioDiv.innerHTML = '';

        pSnap.forEach(pDoc => {
            const p = pDoc.data();
            if (isNaN(p.preco)) return; // Ignora erros de NaN

            const btn = document.createElement('div');
            btn.className = 'item-btn';
            btn.innerHTML = `<span>${p.nome}</span> <span>R$ ${parseFloat(p.preco).toFixed(2)}</span>`;
            
            btn.onclick = async () => {
                const mesaSnap = await getDoc(mesaRef);
                const totalAtual = mesaSnap.exists() ? (mesaSnap.data().total || 0) : 0;
                
                await updateDoc(mesaRef, {
                    ocupada: true,
                    total: totalAtual + parseFloat(p.preco),
                    itens: arrayUnion({ nome: p.nome, preco: parseFloat(p.preco), hora: Date.now() })
                });
            };
            cardapioDiv.appendChild(btn);
        });
    });
</script>
</body>
</html>
