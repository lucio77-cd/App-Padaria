<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salão — Sistema Cris</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="style.css">
  <style>
    /* GRID DE MESAS */
    .mesas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
    }

    .mesa-card {
      aspect-ratio: 1 / 1;
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      gap: 6px;
      user-select: none;
    }

    .mesa-card:hover  { transform: translateY(-3px); box-shadow: var(--shadow-md); }
    .mesa-card:active { transform: scale(0.96); }

    .mesa-card.livre {
      background: var(--livre-bg);
      border-color: #6EE7B7;
    }

    .mesa-card.ocupada {
      background: var(--ocupada-bg);
      border-color: #FCA5A5;
      animation: pulse-ring 2.5s infinite;
    }

    .mesa-num {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .mesa-card.livre   .mesa-num { color: #065F46; }
    .mesa-card.ocupada .mesa-num { color: #991B1B; }

    .mesa-icon { font-size: 1.9rem; line-height: 1; }

    .mesa-valor {
      font-size: 0.95rem;
      font-weight: 800;
      line-height: 1;
    }
    .mesa-card.livre   .mesa-valor { font-size: 0.72rem; font-weight: 500; color: #065F46; }
    .mesa-card.ocupada .mesa-valor { color: #991B1B; }

    /* STATUS PILLS */
    .status-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .status-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 999px; padding: 6px 14px;
      font-size: 0.8rem; font-weight: 600;
      box-shadow: var(--shadow-sm);
    }
    .status-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dot-livre   { background: var(--livre); }
    .dot-ocupada { background: var(--ocupada); }

    /* MODAL CONFIG MESAS */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow-lg);
    }

    .modal-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .modal-sub {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .qty-btn {
      width: 52px; height: 52px;
      font-size: 1.4rem;
      font-weight: 700;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--navy);
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .qty-btn:hover { background: var(--border); }

    .qty-val {
      flex: 1;
      text-align: center;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--navy);
    }

    .modal-actions { display: flex; gap: 10px; }
    .modal-actions button { flex: 1; }

    @media (max-width: 768px) {
      .mesas-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .mesa-icon { font-size: 1.5rem; }
    }
    @media (max-width: 360px) {
      .mesas-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">🍞</span>
      <div>
        <div class="logo-text">Sistema Cris</div>
        <span class="logo-sub">Padaria</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="salao.html"      class="nav-item active"><span class="nav-icon">🪑</span> Salão</a>
      <a href="caixa.html"      class="nav-item"><span class="nav-icon">💰</span> Caixa</a>
      <a href="estoque.html"    class="nav-item"><span class="nav-icon">📦</span> Estoque</a>
      <a href="financeiro.html" class="nav-item"><span class="nav-icon">💳</span> Financeiro</a>
      <a href="pessoas.html"    class="nav-item"><span class="nav-icon">👥</span> Pessoas</a>
      <a href="dashboard.html"  class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="produtos.html"   class="nav-item"><span class="nav-icon">🛍️</span> Cardápio</a>
    </nav>
    <div class="sidebar-bottom">
      <button id="btn-sair" class="nav-item" style="color:rgba(255,255,255,0.5);">
        <span class="nav-icon">🚪</span> Sair
      </button>
    </div>
  </aside>

  <!-- CONTEÚDO -->
  <div class="main-content">
    <div class="topbar">
      <span class="topbar-title">🪑 Salão</span>
      <div class="topbar-right" style="gap:8px; display:flex; align-items:center;">
        <button id="btn-config-mesas" class="btn btn-ghost" style="font-size:0.8rem; padding:7px 12px;">
          ⚙️ Mesas
        </button>
        <button id="btn-sair-mobile" class="btn btn-ghost" style="font-size:0.8rem; padding:7px 12px; color:#EF4444; border-color:#EF4444;">
          🚪 Sair
        </button>
      </div>
    </div>

    <div class="page-body">
      <div class="status-bar">
        <div class="status-pill">
          <div class="status-dot dot-ocupada"></div>
          <span id="cnt-ocupadas">0 ocupadas</span>
        </div>
        <div class="status-pill">
          <div class="status-dot dot-livre"></div>
          <span id="cnt-livres">— livres</span>
        </div>
      </div>

      <div id="container-mesas" class="mesas-grid"></div>
    </div>
  </div>

  <!-- BOTTOM NAV MOBILE -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="salao.html"      class="bnav-item active"><span class="bnav-icon">🪑</span>Salão</a>
      <a href="caixa.html"      class="bnav-item"><span class="bnav-icon">💰</span>Caixa</a>
      <a href="estoque.html"    class="bnav-item"><span class="bnav-icon">📦</span>Estoque</a>
      <a href="financeiro.html" class="bnav-item"><span class="bnav-icon">💳</span>Financeiro</a>
      <a href="dashboard.html"  class="bnav-item"><span class="bnav-icon">📊</span>Dados</a>
    </div>
  </nav>
</div>

<!-- MODAL CONFIG MESAS -->
<div class="modal-overlay" id="modal-mesas">
  <div class="modal-box">
    <div class="modal-title">⚙️ Configurar Mesas</div>
    <div class="modal-sub">Quantas mesas tem o seu salão?</div>

    <div class="qty-control">
      <button class="qty-btn" id="qty-menos">−</button>
      <div class="qty-val" id="qty-num">11</div>
      <button class="qty-btn" id="qty-mais">+</button>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-cancelar">Cancelar</button>
      <button class="btn btn-primary" id="modal-salvar">Salvar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script type="module">
  import { db, auth } from './firebase.js';
  import { collection, onSnapshot, doc, getDoc, setDoc } from
    "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { signOut } from
    "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ─── ESTADO GLOBAL ──────────────────────────────────────────────
  let qtdMesas   = 11;       // número de mesas configurado
  let dadosMesas = {};       // último snapshot das mesas do Firestore

  // ─── TOAST ──────────────────────────────────────────────────────
  function showToast(msg, type = '') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  // ─── RENDER — chamado sempre que mesas ou config mudam ──────────
  function renderMesas() {
    const container = document.getElementById('container-mesas');
    container.innerHTML = '';
    let ocupadas = 0;

    for (let i = 1; i <= qtdMesas; i++) {
      const mesa  = dadosMesas[`mesa_${i}`] || { ocupada: false, total: 0 };
      const total = mesa.total || 0;

      if (mesa.ocupada) ocupadas++;

      const card = document.createElement('div');
      card.className = `mesa-card ${mesa.ocupada ? 'ocupada' : 'livre'}`;
      card.innerHTML = `
        <div class="mesa-num">Mesa ${i}</div>
        <div class="mesa-icon">${mesa.ocupada ? '🔴' : '🟢'}</div>
        <div class="mesa-valor">
          ${mesa.ocupada ? 'R$ ' + total.toFixed(2) : 'Livre'}
        </div>
      `;
      card.onclick = () => { window.location.href = `pedido.html?mesa=${i}`; };
      container.appendChild(card);
    }

    const livres = qtdMesas - ocupadas;
    document.getElementById('cnt-ocupadas').textContent =
      `${ocupadas} ocupada${ocupadas !== 1 ? 's' : ''}`;
    document.getElementById('cnt-livres').textContent =
      `${livres} livre${livres !== 1 ? 's' : ''}`;
  }

  // ─── MODAL ──────────────────────────────────────────────────────
  document.getElementById('btn-config-mesas').onclick = () => {
    document.getElementById('qty-num').textContent = qtdMesas;
    document.getElementById('modal-mesas').classList.add('open');
  };
  document.getElementById('modal-cancelar').onclick = () =>
    document.getElementById('modal-mesas').classList.remove('open');
  document.getElementById('qty-menos').onclick = () => {
    const v = parseInt(document.getElementById('qty-num').textContent);
    if (v > 1) document.getElementById('qty-num').textContent = v - 1;
  };
  document.getElementById('qty-mais').onclick = () => {
    const v = parseInt(document.getElementById('qty-num').textContent);
    if (v < 50) document.getElementById('qty-num').textContent = v + 1;
  };

  // ─── FIREBASE ───────────────────────────────────────────────────
  auth.onAuthStateChanged(async user => {
    if (!user) { location.href = 'index.html'; return; }

    // Botão Sair (sidebar desktop + topbar mobile)
    const fnSair = async () => {
      if (confirm('Deseja sair do sistema?')) {
        await signOut(auth);
        location.href = 'index.html';
      }
    };
    document.getElementById('btn-sair').onclick        = fnSair;
    document.getElementById('btn-sair-mobile').onclick = fnSair;

    const configRef = doc(db, `config_${user.uid}`, 'salao');
    const mesasRef  = collection(db, `mesas_${user.uid}`);

    // 1. Carrega config salva (aguarda antes de qualquer render)
    try {
      const snap = await getDoc(configRef);
      qtdMesas = snap.exists() ? (snap.data().totalMesas || 11) : 11;
      if (!snap.exists()) await setDoc(configRef, { totalMesas: 11 });
    } catch(e) {
      qtdMesas = 11;
    }

    // 2. Primeira renderização imediata (sem esperar Firestore de mesas)
    renderMesas();

    // 3. Listener de mesas — atualiza dadosMesas e re-renderiza
    onSnapshot(mesasRef, snap => {
      dadosMesas = {};
      snap.forEach(d => { dadosMesas[d.id] = d.data(); });
      renderMesas();
    });

    // 4. Botão Salvar do modal — grava no Firestore e re-renderiza na hora
    document.getElementById('modal-salvar').onclick = async () => {
      const novoTotal = parseInt(document.getElementById('qty-num').textContent);
      const btn = document.getElementById('modal-salvar');
      btn.disabled = true;
      btn.textContent = 'Salvando...';

      try {
        await setDoc(configRef, { totalMesas: novoTotal });
        qtdMesas = novoTotal;              // atualiza estado local
        renderMesas();                     // re-renderiza IMEDIATAMENTE
        document.getElementById('modal-mesas').classList.remove('open');
        showToast(`✅ ${novoTotal} mesas configuradas!`, 'success');
      } catch(e) {
        showToast('Erro ao salvar. Tente novamente.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Salvar';
      }
    };
  });
</script>
</body>
</html>
