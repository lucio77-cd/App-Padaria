<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salão - Sistema Cris</title>
    <style>
        /* Mantendo o seu estilo visual original */
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        header { background: #2c3e50; color: white; padding: 20px; text-align: center; margin-bottom: 20px; }
        .grid-mesas { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding: 15px; 
        }
        .mesa { 
            aspect-ratio: 1/1; 
            border-radius: 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            font-weight: bold; 
            cursor: pointer; 
            border: none; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            transition: 0.2s; 
        }
        /* Suas cores de status */
        .livre { background: #a2e4c1; color: #1e4d35; border: 3px solid #2ecc71; }
        .ocupada { background: #f1948a; color: #7b241c; border: 3px solid #e74c3c; }
        .mesa:active { transform: scale(0.95); }
        
        .footer-info { 
            background: #2c3e50; 
            color: white; 
            padding: 10px; 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            text-align: center; 
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <h1>SISTEMA CRIS</h1>
</header>

<div class="grid-mesas" id="container-mesas">
    </div>

<div class="footer-info" id="status-footer">
    Carregando informações...
</div>

<script type="module">
    import { db, auth } from './firebase.js';
    import { collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    auth.onAuthStateChanged(user => {
        if (!user) return;

        // Referência da sua coleção de mesas
        const mesasRef = collection(db, `mesas_${user.uid}`);

        onSnapshot(mesasRef, (snapshot) => {
            const container = document.getElementById('container-mesas');
            container.innerHTML = '';
            
            let totalOcupadas = 0;
            let totalLivres = 0;

            // Criando as 6 mesas conforme sua imagem
            for (let i = 1; i <= 6; i++) {
                let dadosMesa = { ocupada: false, total: 0 };
                
                // Busca os dados reais de cada mesa no Firebase
                snapshot.forEach(doc => {
                    if (doc.id === `mesa_${i}`) {
                        dadosMesa = doc.data();
                    }
                });

                if (dadosMesa.ocupada) totalOcupadas++; else totalLivres++;

                const btn = document.createElement('button');
                btn.className = `mesa ${dadosMesa.ocupada ? 'ocupada' : 'livre'}`;
                
                // Mantendo o layout de texto das suas mesas
                btn.innerHTML = `
                    <div style="font-size: 1.3rem; margin-bottom: 5px;">MESA ${i}</div>
                    <div style="font-size: 0.9rem;">${dadosMesa.ocupada ? 'R$ ' + (dadosMesa.total || 0).toFixed(2) : 'LIVRE'}</div>
                `;
                
                // CORREÇÃO: O clique agora envia o ID da mesa corretamente para o pedido.html
                btn.onclick = () => {
                    window.location.href = `pedido.html?mesa=${i}`;
                };

                container.appendChild(btn);
            }

            // Atualiza o rodapé de contagem como no seu app original
            document.getElementById('status-footer').innerText = `Ocupadas: ${totalOcupadas} | Livres: ${totalLivres}`;
        });
    });
</script>

</body>
</html>
