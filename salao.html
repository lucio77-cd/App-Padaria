<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salão - Sistema Cris</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
        .grid-mesas { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .mesa { aspect-ratio: 1/1; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; font-size: 1.2rem; cursor: pointer; border: none; }
        .livre { background-color: #a2e4c9; color: #1e4d3a; border: 2px solid #2ecc71; }
        .ocupada { background-color: #f1948a; color: #7b241c; border: 2px solid #e74c3c; }
    </style>
</head>
<body>
    <header><h1>SALÃO</h1></header>
    <div class="grid-mesas" id="salao-container"></div>

    <script type="module">
        import { db, auth } from './firebase.js';
        import { collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        auth.onAuthStateChanged(user => {
            if (user) {
                const q = query(collection(db, `mesas_${user.uid}`));
                onSnapshot(q, (snapshot) => {
                    const container = document.getElementById('salao-container');
                    container.innerHTML = '';
                    for (let i = 1; i <= 10; i++) {
                        let dados = { ocupada: false };
                        snapshot.forEach(doc => { if (doc.id === `mesa_${i}`) dados = doc.data(); });
                        
                        const btn = document.createElement('button');
                        btn.className = `mesa ${dados.ocupada ? 'ocupada' : 'livre'}`;
                        btn.innerHTML = `<span>MESA ${i}</span><small>${dados.ocupada ? 'EDITAR' : 'ABRIR'}</small>`;
                        btn.onclick = () => window.location.href = `pedido.html?mesa=${i}`;
                        container.appendChild(btn);
                    }
                });
            }
        });
    </script>
</body>
</html>
