<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema - Salão</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        header { background: #2c3e50; color: white; padding: 40px 20px; text-align: center; font-size: 1.8rem; font-weight: bold; text-transform: uppercase; }
        
        /* Grid ajustado para 3 colunas para caber as 11 mesas no celular */
        .grid-mesas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; margin-bottom: 70px; }
        
        .mesa { aspect-ratio: 1/1; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; border: 3px solid transparent; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .livre { background: #a2e4c1; color: #1e4d35; border-color: #2ecc71; }
        .ocupada { background: #f1948a; color: #7b241c; border-color: #e74c3c; }
        .mesa-titulo { font-size: 1.1rem; }
        .mesa-status { font-size: 0.8rem; }

        .footer-status { background: #2c3e50; color: white; padding: 15px; position: fixed; bottom: 0; width: 100%; text-align: center; font-size: 1rem; }
        
        .nav-menu { display: flex; justify-content: space-around; margin-top: 10px; padding: 0 20px; gap: 10px; }
        .nav-menu button { flex: 1; padding: 15px; border-radius: 10px; border: none; background: #34495e; color: white; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
    </style>
</head>
<body>

<header>SISTEMA </header>
    
<div class="nav-botoes">
    <button id="btn-sair" style="background: #e74c3c; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer;">SAIR</button>
</div>

<div class="nav-menu">
    <button onclick="location.href='produtos.html'">PRODUTO</button>
    <button onclick="location.href='caixa.html'">CAIXA</button>
    <button onclick="location.href='dashboard.html'">DASHBOARD</button>
</div>

<div class="grid-mesas" id="container-mesas">
    </div>

<div class="footer-status" id="barra-status">Ocupadas: 0 | Livres: 0</div>

<script type="module">

    // No topo do script do salao.html, adicione o signOut
import { db, auth } from './firebase.js';
import { signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ... (resto do seu código das mesas) ...

// Lógica para o botão Sair (Coloque isso antes de fechar o script)
const btnSair = document.getElementById('btn-sair');
if (btnSair) {
    btnSair.onclick = async () => {
        if (confirm("Deseja realmente sair do sistema?")) {
            await signOut(auth);
            location.href = 'index.html'; 
        }
    };
}

// Proteção: Se deslogar, volta pro login
auth.onAuthStateChanged(user => {
    if (!user) location.href = 'index.html';
});


    
    import { db, auth } from './firebase.js';
    import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    auth.onAuthStateChanged(user => {
        if (!user) return;
        const mesasRef = collection(db, `mesas_${user.uid}`);

        onSnapshot(mesasRef, (snapshot) => {
            const container = document.getElementById('container-mesas');
            container.innerHTML = '';
            let ocupadas = 0; 
            let livres = 0;

            // Lógica para 11 mesas conforme configurado no Firebase
            for (let i = 1; i <= 11; i++) {
                let mesaDoc = { ocupada: false, total: 0 };
                
                snapshot.forEach(doc => {
                    if (doc.id === `mesa_${i}`) mesaDoc = doc.data();
                });

                if (mesaDoc.ocupada) ocupadas++; else livres++;

                const btn = document.createElement('div');
                btn.className = `mesa ${mesaDoc.ocupada ? 'ocupada' : 'livre'}`;
                
                btn.innerHTML = `
                    <div class="mesa-titulo">MESA ${i}</div>
                    <div class="mesa-status">
                        ${mesaDoc.ocupada ? 'R$ ' + (mesaDoc.total || 0).toFixed(2) : 'LIVRE'}
                    </div>
                `;
                
                // Clique dinâmico: envia o número da mesa para a página de pedidos
                btn.onclick = () => {
                    window.location.href = `pedido.html?mesa=${i}`;
                };

                container.appendChild(btn);
            }

            // Atualiza a barra inferior com os totais reais
            document.getElementById('barra-status').innerText = `Ocupadas: ${ocupadas} | Livres: ${livres}`;
        });
    });
</script>

</body>
</html>
