<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salão - Sistema Cris</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; border-radius: 0 0 15px 15px; }
        .grid-mesas { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .mesa { aspect-ratio: 1/1; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: 0.2s; }
        .livre { background: #a2e4c1; color: #1e4d35; border: 3px solid #2ecc71; }
        .ocupada { background: #f1948a; color: #7b241c; border: 3px solid #e74c3c; }
        .mesa:active { transform: scale(0.95); }
    </style>
</head>
<body>

<header><h1>SISTEMA CRIS</h1></header>

<div class="grid-mesas" id="container-mesas"></div>

<script type="module">
    import { db, auth } from './firebase.js';
    import { collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    auth.onAuthStateChanged(user => {
        if (!user) return;

        const q = query(collection(db, `mesas_${user.uid}`));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('container-mesas');
            container.innerHTML = '';

            // Criar mesas de 1 a 6 dinamicamente
            for (let i = 1; i <= 6; i++) {
                let dadosMesa = { ocupada: false, total: 0 };
                
                snapshot.forEach(doc => {
                    if (doc.id === `mesa_${i}`) dadosMesa = doc.data();
                });

                const btn = document.createElement('button');
                btn.className = `mesa ${dadosMesa.ocupada ? 'ocupada' : 'livre'}`;
                btn.innerHTML = `
                    <span style="font-size: 1.5rem;">MESA ${i}</span>
                    <span>${dadosMesa.ocupada ? 'R$ ' + dadosMesa.total.toFixed(2) : 'LIVRE'}</span>
                `;
                
                // IMPORTANTE: Passa o ID da mesa na URL
                btn.onclick = () => {
                    location.href = `pedido.html?mesa=${i}`;
                };

                container.appendChild(btn);
            }
        });
    });
</script>
</body>
</html>
